<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>OW · Client Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@300;400;700;900&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<script src="/gallery-config.js"></script>
<style>
:root{--ink:#0a0a0a;--cream:#f0ece3;--hot:#ff2d6b;--electric:#00f5c4;--violet:#7b2fff;--amber:#ffb800;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--ink);color:var(--cream);font-family:'DM Sans',sans-serif;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:0.04;pointer-events:none;z-index:0;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 40px;padding-top:max(16px,calc(10px + env(safe-area-inset-top)));display:flex;align-items:center;justify-content:space-between;background:#0a0a0a;border-bottom:1px solid rgba(240,236,227,0.07);}
.nav-logo{font-family:'Unbounded',sans-serif;font-weight:900;font-size:13px;color:var(--cream);text-decoration:none;letter-spacing:-0.02em;}
.nav-logo span{color:var(--hot);}
.nav-right{display:flex;align-items:center;gap:16px;}
.nav-client-name{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.08em;color:rgba(240,236,227,0.35);display:none;}
.nav-logout{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(240,236,227,0.35);background:transparent;border:1px solid rgba(240,236,227,0.1);padding:7px 14px;cursor:pointer;transition:all 0.2s;border-radius:2px;display:none;}
.nav-logout:hover{color:var(--hot);border-color:var(--hot);}

/* ── LOGIN ── */
#loginScreen{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.login-box{width:100%;max-width:400px;background:rgba(240,236,227,0.03);border:1px solid rgba(240,236,227,0.08);padding:48px 40px;}
.login-eyebrow{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--hot);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.login-eyebrow::before{content:'';width:16px;height:1px;background:var(--hot);}
.login-title{font-family:'Unbounded',sans-serif;font-weight:900;font-size:28px;letter-spacing:-0.02em;margin-bottom:6px;}
.login-sub{font-family:'Space Mono',monospace;font-size:10px;color:rgba(240,236,227,0.3);letter-spacing:0.06em;margin-bottom:36px;}
.login-group{margin-bottom:16px;}
.login-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(240,236,227,0.4);display:block;margin-bottom:6px;}
.login-input{width:100%;background:rgba(240,236,227,0.05);border:1px solid rgba(240,236,227,0.1);color:var(--cream);font-family:'DM Sans',sans-serif;font-size:15px;padding:12px 14px;outline:none;transition:border-color 0.2s;border-radius:2px;}
.login-input:focus{border-color:rgba(240,236,227,0.3);}
.login-input::placeholder{color:rgba(240,236,227,0.2);}
.login-btn{width:100%;margin-top:8px;font-family:'Unbounded',sans-serif;font-weight:700;font-size:13px;padding:14px;background:var(--hot);color:var(--cream);border:none;cursor:pointer;transition:all 0.2s;border-radius:2px;}
.login-btn:hover{background:var(--cream);color:var(--ink);}
.login-error{font-family:'Space Mono',monospace;font-size:10px;color:var(--hot);letter-spacing:0.06em;margin-top:12px;display:none;}

/* ── GALLERY ── */
#galleryScreen{display:none;position:relative;z-index:1;padding:90px 40px 60px;max-width:1400px;margin:0 auto;}

.gallery-header{margin-bottom:36px;}
.gallery-eyebrow{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--electric);margin-bottom:10px;}
.gallery-title{font-family:'Unbounded',sans-serif;font-weight:900;font-size:clamp(28px,4vw,48px);letter-spacing:-0.02em;margin-bottom:6px;}
.gallery-event{font-family:'Space Mono',monospace;font-size:11px;color:rgba(240,236,227,0.3);letter-spacing:0.08em;margin-bottom:20px;}
.gallery-meta-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:24px;}
.gallery-count{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.1em;color:rgba(240,236,227,0.35);}
.gallery-drive-btn{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;padding:10px 20px;background:transparent;border:1px solid var(--electric);color:var(--electric);text-decoration:none;transition:all 0.2s;border-radius:2px;display:none;align-items:center;gap:8px;}
.gallery-drive-btn:hover{background:var(--electric);color:var(--ink);}
.gallery-info-bar{background:rgba(240,236,227,0.03);border:1px solid rgba(240,236,227,0.07);border-left:2px solid var(--electric);padding:16px 20px;margin-bottom:32px;}
.gallery-info-bar p{font-size:14px;color:rgba(240,236,227,0.5);line-height:1.65;}

/* MASONRY GRID */
.masonry-grid{columns:4;column-gap:4px;}
.masonry-item{break-inside:avoid;margin-bottom:4px;overflow:hidden;cursor:pointer;position:relative;display:block;background:rgba(240,236,227,0.04);}
.masonry-item img{width:100%;display:block;transition:transform 0.4s ease,filter 0.3s;filter:brightness(0.92);vertical-align:bottom;}
.masonry-item:hover img{transform:scale(1.03);filter:brightness(1);}
.masonry-item-overlay{position:absolute;inset:0;background:rgba(10,10,10,0);transition:background 0.3s;display:flex;align-items:center;justify-content:center;}
.masonry-item:hover .masonry-item-overlay{background:rgba(10,10,10,0.15);}
.masonry-zoom-icon{opacity:0;color:rgba(240,236,227,0.8);font-size:20px;transition:opacity 0.3s;}
.masonry-item:hover .masonry-zoom-icon{opacity:1;}

/* EMPTY STATE */
.gallery-empty{text-align:center;padding:80px 20px;}
.gallery-empty-icon{font-size:48px;margin-bottom:16px;opacity:0.15;}
.gallery-empty-title{font-family:'Unbounded',sans-serif;font-weight:700;font-size:18px;margin-bottom:8px;opacity:0.35;}
.gallery-empty-sub{font-family:'Space Mono',monospace;font-size:10px;color:rgba(240,236,227,0.2);letter-spacing:0.08em;}

/* LOADING STATE */
.gallery-loading{text-align:center;padding:60px 20px;}
.loading-dots{display:flex;justify-content:center;gap:6px;margin-bottom:12px;}
.loading-dot{width:6px;height:6px;border-radius:50%;background:var(--hot);animation:loadDot 1.2s ease-in-out infinite;}
.loading-dot:nth-child(2){animation-delay:0.2s;}
.loading-dot:nth-child(3){animation-delay:0.4s;}
@keyframes loadDot{0%,80%,100%{transform:scale(0.6);opacity:0.4;}40%{transform:scale(1);opacity:1;}}
.loading-text{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(240,236,227,0.3);}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(10,10,10,0.97);z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center;}
.lightbox.open{display:flex;}
.lightbox-img-wrap{position:relative;max-width:94vw;max-height:88vh;display:flex;align-items:center;justify-content:center;}
.lightbox img{max-width:94vw;max-height:88vh;object-fit:contain;display:block;}
.lightbox-close{position:fixed;top:20px;right:24px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(240,236,227,0.4);background:rgba(10,10,10,0.8);border:1px solid rgba(240,236,227,0.12);padding:8px 16px;cursor:pointer;transition:all 0.2s;border-radius:2px;}
.lightbox-close:hover{color:var(--cream);border-color:rgba(240,236,227,0.3);}
.lightbox-counter{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.1em;color:rgba(240,236,227,0.35);}
.lightbox-prev,.lightbox-next{position:fixed;top:50%;transform:translateY(-50%);font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.1em;color:rgba(240,236,227,0.4);background:rgba(10,10,10,0.7);border:1px solid rgba(240,236,227,0.1);padding:14px 12px;cursor:pointer;transition:all 0.2s;border-radius:2px;}
.lightbox-prev{left:12px;}
.lightbox-next{right:12px;}
.lightbox-prev:hover,.lightbox-next:hover{color:var(--cream);border-color:rgba(240,236,227,0.3);}

@media(max-width:1100px){.masonry-grid{columns:3;}}
@media(max-width:768px){
  nav{padding:14px 20px;}
  #galleryScreen{padding:75px 16px 40px;}
  .masonry-grid{columns:2;}
  .login-box{padding:32px 24px;}
  .gallery-meta-row{gap:10px;}
}
@media(max-width:420px){.masonry-grid{columns:1;}}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">OW<span>.</span></a>
  <div class="nav-right">
    <span class="nav-client-name" id="navClientName"></span>
    <button class="nav-logout" id="navLogout" onclick="logout()">Sign out</button>
  </div>
</nav>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <p class="login-eyebrow">Client Access</p>
    <h1 class="login-title">Your Gallery</h1>
    <p class="login-sub">Enter your credentials to view your photos.</p>
    <div class="login-group">
      <label class="login-label" for="loginUser">Username</label>
      <input type="text" id="loginUser" class="login-input" placeholder="Your username" autocomplete="off" autocapitalize="off" spellcheck="false"/>
    </div>
    <div class="login-group">
      <label class="login-label" for="loginPass">Password</label>
      <input type="password" id="loginPass" class="login-input" placeholder="Your password" autocomplete="current-password"/>
    </div>
    <button class="login-btn" onclick="doLogin()">View my gallery</button>
    <p class="login-error" id="loginError">Incorrect credentials. Please try again.</p>
  </div>
</div>

<!-- GALLERY -->
<div id="galleryScreen">
  <div class="gallery-header">
    <p class="gallery-eyebrow">Private Gallery</p>
    <h2 class="gallery-title" id="galleryTitle"></h2>
    <p class="gallery-event" id="galleryEvent"></p>
    <div class="gallery-meta-row">
      <span class="gallery-count" id="galleryCount"></span>
      <a class="gallery-drive-btn" id="galleryDriveBtn" target="_blank" rel="noopener">
        ↓ Download full-res photos
      </a>
    </div>
    <div class="gallery-info-bar" id="galleryInfoBar" style="display:none;">
      <p id="galleryInfoText"></p>
    </div>
  </div>

  <div id="galleryLoading" class="gallery-loading" style="display:none;">
    <div class="loading-dots">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
    <p class="loading-text">Loading your photos...</p>
  </div>

  <div class="masonry-grid" id="masonryGrid"></div>

  <div class="gallery-empty" id="galleryEmpty" style="display:none;">
    <div class="gallery-empty-icon">📷</div>
    <h3 class="gallery-empty-title">Photos coming soon</h3>
    <p class="gallery-empty-sub">Still editing — check back shortly.</p>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">Close ✕</button>
  <button class="lightbox-prev" onclick="lightboxNav(-1)">←</button>
  <div class="lightbox-img-wrap">
    <img id="lightboxImg" src="" alt=""/>
  </div>
  <button class="lightbox-next" onclick="lightboxNav(1)">→</button>
  <p class="lightbox-counter" id="lightboxCounter"></p>
</div>

<script>
(function() {

var currentClient = null;
var currentPhotos = [];
var lightboxIndex = 0;

// ── HELPERS ──
function $(id) { return document.getElementById(id); }
function show(id) { $(id).style.display = 'block'; }
function hide(id) { $(id).style.display = 'none'; }
function flex(id) { $(id).style.display = 'flex'; }

// ── AUTO LOGIN from session ──
(function checkSession() {
  var u = sessionStorage.getItem('owg_user');
  var p = sessionStorage.getItem('owg_pass');
  if (u && GALLERY_CLIENTS[u] && GALLERY_CLIENTS[u].password === p) {
    renderGallery(u);
  }
})();

// ── LOGIN ──
window.doLogin = function() {
  var user = $('loginUser').value.trim().toLowerCase();
  var pass = $('loginPass').value;
  $('loginError').style.display = 'none';
  if (GALLERY_CLIENTS[user] && GALLERY_CLIENTS[user].password === pass) {
    sessionStorage.setItem('owg_user', user);
    sessionStorage.setItem('owg_pass', pass);
    renderGallery(user);
  } else {
    $('loginError').style.display = 'block';
    $('loginPass').value = '';
  }
};

$('loginPass').addEventListener('keydown', function(e) { if (e.key === 'Enter') window.doLogin(); });
$('loginUser').addEventListener('keydown', function(e) { if (e.key === 'Enter') $('loginPass').focus(); });

// ── RENDER GALLERY ──
function renderGallery(user) {
  var client = GALLERY_CLIENTS[user];
  currentClient = client;
  currentPhotos = client.photos || [];

  // Switch screens
  hide('loginScreen');
  show('galleryScreen');

  // Nav
  $('navClientName').textContent = client.name;
  $('navClientName').style.display = 'block';
  $('navLogout').style.display = 'block';

  // Header
  $('galleryTitle').textContent = client.name;
  $('galleryEvent').textContent = client.event || '';

  // Photo count
  var displayCount = client.photoCount || currentPhotos.length;
  $('galleryCount').textContent = displayCount > 0 ? displayCount + ' photos' : '';

  // Google Drive button
  if (client.driveLink) {
    $('galleryDriveBtn').href = client.driveLink;
    $('galleryDriveBtn').style.display = 'flex';
  } else {
    $('galleryDriveBtn').style.display = 'none';
  }

  // Info bar
  if (client.info) {
    $('galleryInfoBar').style.display = 'block';
    $('galleryInfoText').textContent = client.info;
  }

  // Build grid
  buildMasonry(client);
}

// ── BUILD MASONRY ──
function buildMasonry(client) {
  var grid = $('masonryGrid');
  grid.innerHTML = '';

  if (!currentPhotos.length) {
    show('galleryEmpty');
    return;
  }

  hide('galleryEmpty');
  show('galleryLoading');

  var loaded = 0;
  var total = currentPhotos.length;

  currentPhotos.forEach(function(filename, idx) {
    var src = client.folder + filename;
    var item = document.createElement('div');
    item.className = 'masonry-item';
    item.dataset.idx = idx;

    var img = document.createElement('img');
    img.alt = client.name + ' · ' + (idx + 1);
    img.loading = 'lazy';
    img.decoding = 'async';

    // Handle any rotation via CSS — object-fit covers it
    img.style.width = '100%';
    img.style.display = 'block';

    var overlay = document.createElement('div');
    overlay.className = 'masonry-item-overlay';
    var zoomIcon = document.createElement('span');
    zoomIcon.className = 'masonry-zoom-icon';
    zoomIcon.textContent = '⊕';
    overlay.appendChild(zoomIcon);

    item.appendChild(img);
    item.appendChild(overlay);

    item.addEventListener('click', function() { openLightbox(idx); });

    img.onload = function() {
      loaded++;
      if (loaded === total) hide('galleryLoading');
    };
    img.onerror = function() {
      loaded++;
      item.style.display = 'none'; // hide broken images silently
      if (loaded === total) hide('galleryLoading');
    };

    img.src = src;
    grid.appendChild(item);
  });

  // Fallback hide loading after 8s
  setTimeout(function() { hide('galleryLoading'); }, 8000);
}

// ── LIGHTBOX ──
window.openLightbox = function(idx) {
  if (!currentPhotos.length) return;
  lightboxIndex = idx;
  updateLightbox();
  $('lightbox').classList.add('open');
};

function updateLightbox() {
  var client = currentClient;
  $('lightboxImg').src = client.folder + currentPhotos[lightboxIndex];
  $('lightboxCounter').textContent = (lightboxIndex + 1) + ' / ' + currentPhotos.length;
}

window.lightboxNav = function(dir) {
  lightboxIndex = (lightboxIndex + dir + currentPhotos.length) % currentPhotos.length;
  updateLightbox();
};

window.closeLightbox = function() {
  $('lightbox').classList.remove('open');
};

// Keyboard nav
document.addEventListener('keydown', function(e) {
  if (!$('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') window.closeLightbox();
  if (e.key === 'ArrowRight') window.lightboxNav(1);
  if (e.key === 'ArrowLeft') window.lightboxNav(-1);
});

// Touch swipe on lightbox
var lbTouchX = 0;
$('lightbox').addEventListener('touchstart', function(e) {
  lbTouchX = e.touches[0].clientX;
}, {passive: true});
$('lightbox').addEventListener('touchend', function(e) {
  var dx = e.changedTouches[0].clientX - lbTouchX;
  if (Math.abs(dx) > 50) window.lightboxNav(dx > 0 ? -1 : 1);
}, {passive: true});

// Close on backdrop click
$('lightbox').addEventListener('click', function(e) {
  if (e.target === this) window.closeLightbox();
});

// ── LOGOUT ──
window.logout = function() {
  sessionStorage.removeItem('owg_user');
  sessionStorage.removeItem('owg_pass');
  currentClient = null;
  currentPhotos = [];
  hide('galleryScreen');
  show('loginScreen');
  $('navClientName').style.display = 'none';
  $('navLogout').style.display = 'none';
  $('loginUser').value = '';
  $('loginPass').value = '';
  $('loginError').style.display = 'none';
  $('masonryGrid').innerHTML = '';
  hide('galleryEmpty');
};

})();
</script>
</body>
</html>
